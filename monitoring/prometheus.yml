global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: env-service
    static_configs:
      - targets: ['env-service:7860']
    metrics_path: /metrics

  - job_name: inference-service
    static_configs:
      - targets: ['inference-service:8001']
    metrics_path: /metrics

  - job_name: worker-service
    static_configs:
      - targets: ['worker-service:9101']

  - job_name: redis
    static_configs:
      - targets: ['redis:6379']