apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-service
  namespace: gridfault
  labels:
    app: env-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: env-service
  template:
    metadata:
      labels:
        app: env-service
    spec:
      containers:
        - name: env-service
          image: sakshishukla10/grid-fault-env:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7860
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
          envFrom:
            - secretRef:
                name: gridfault-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: env-service
  namespace: gridfault
spec:
  selector:
    app: env-service
  ports:
    - port: 7860
      targetPort: 7860
  type: ClusterIP