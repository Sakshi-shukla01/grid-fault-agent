apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gridfault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gridfault
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: env-service
        static_configs:
          - targets: ['env-service:7860']
        metrics_path: /metrics
      - job_name: inference-service
        static_configs:
          - targets: ['inference-service:8001']
        metrics_path: /metrics
      - job_name: worker-service
        static_configs:
          - targets: ['worker-service:9101']

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gridfault
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30900
  type: NodePort